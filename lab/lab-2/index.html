<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Form</title>
</head>

<body>
    <h1>Form</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>My Form</legend>
            <br>
            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="fname" required>
            <br><br>
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" required>
            <br><br>
            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required>
            <br><br>

            <label for="department">Department:</label>
            <select id="department" name="department" required>
                <option value="">Select Department</option>
                <option value="CS">Computer Science</option>
                <option value="EE">Electrical Engineering</option>
                <option value="ME">Mechanical Engineering</option>
            </select>
            <br><br>

            <input type="checkbox" id="c" name="language" value="C" required>
            <label for="c">C</label>
            <input type="checkbox" id="cpp" name="language" value="C++" required>
            <label for="cpp">C++</label>
            <input type="checkbox" id="java" name="language" value="Java" required>
            <label for="java">Java</label>
            <br><br>

            <label for="address">Address:</label>
            <textarea id="address" name="address" rows="4" cols="50" placeholder="Enter your address here..."
                required></textarea>
            <br><br>

            <label for="photo"> Upload Photo:</label>
            <input type="file" id="photo" name="photo">
            <br><br>

            <label for="file">Document:</label>
            <input type="file" id="file" name="file">
            <br><br>

            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </fieldset>
    </form>
</body>

</html>
