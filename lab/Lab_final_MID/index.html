<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>University Club Membership Registration</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">
  <h2>University Club Membership Registration</h2>

  <form id="regForm" novalidate>

    <label for="firstName">First Name</label>
    <input type="text" id="firstName">

    <label for="lastName">Last Name</label>
    <input type="text" id="lastName">

    <label for="email">Email Address</label>
    <input type="email" id="email">

    <label for="password">Password</label>
    <input type="password" id="password">

    <label>Gender</label>
    <div class="radio-group">
      <label><input type="radio" name="gender" value="Male"> Male</label>
      <label><input type="radio" name="gender" value="Female"> Female</label>
      <label><input type="radio" name="gender" value="Other"> Other</label>
    </div>

    <label>Interested Clubs</label>
    <div class="checkbox-group">
      <label><input type="checkbox" name="clubs" value="AIUB Computer Club"> AIUB Computer Club</label>
      <label><input type="checkbox" name="clubs" value="AIUB Debate Club"> AIUB Debate Club</label>
      <label><input type="checkbox" name="clubs" value="AIUB Cultural Club"> AIUB Cultural Club</label>
      <label><input type="checkbox" name="clubs" value="AIUB Robotics Crew"> AIUB Robotics Crew</label>
    </div>

    <label for="category">Club Category</label>
    <select id="category">
      <option value="" selected disabled>-- Select Category --</option>
      <option value="Academic">Academic</option>
      <option value="Cultural">Cultural</option>
      <option value="Sports">Sports</option>
      <option value="Technical">Technical</option>
    </select>

    <label for="reason">Why do you want to join?</label>
    <textarea id="reason" rows="4"></textarea>

    <button type="submit" id="submitBtn">Register</button>
    <p id="lockMessage"></p>

  </form>
</div>

<script src="script.js"></script>
</body>
</html>
